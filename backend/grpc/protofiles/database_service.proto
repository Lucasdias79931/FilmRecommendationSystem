syntax = "proto3";

package database_service;

enum STATUS {
    DONE = 0;
    PROCESSING = 1;
    FAILURE = 2;
}

message Handle {
    string error = 1;
    string message = 2;
    STATUS status = 3;
}

message Filters {
    string categoryMovie = 1;
    string origin = 2;
    string style = 3;
    string pace = 4;
    float rate = 5;
}

message MovieRPC {
    string name = 1;
    Filters filters = 2;
    string id = 3;
    int32 year = 4; 
}

message MoviesRPC {
    repeated MovieRPC movies = 1; 
}

message GetRequest{
    string id = 1;
}

service DatabaseService {
    rpc Save(MovieRPC) returns (Handle);
    rpc Delete(GetRequest) returns (Handle);
    rpc GetAll(Filters) returns (MoviesRPC);
    rpc Get(GetRequest) returns (MovieRPC);
}